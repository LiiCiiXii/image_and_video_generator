<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generated Images</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111316;
      --panel: #181c20;
      --panel-2: #20262c;
      --text: #f4f1ea;
      --muted: #a9b0b7;
      --line: #343b43;
      --accent: #f2b84b;
      --accent-2: #6fd1c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 3;
      border-bottom: 1px solid var(--line);
      background: rgba(17, 19, 22, 0.94);
      backdrop-filter: blur(18px);
    }

    .bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
    }

    .tools {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    input,
    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 0 12px;
      outline: none;
    }

    input {
      width: min(320px, 42vw);
    }

    input:focus,
    select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(111, 209, 199, 0.16);
    }

    main {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
      align-items: start;
    }

    figure {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    figure:hover {
      transform: translateY(-2px);
      border-color: rgba(242, 184, 75, 0.72);
      background: var(--panel-2);
    }

    figure img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #0c0e10;
    }

    figcaption {
      padding: 9px 10px 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      word-break: break-word;
    }

    .empty {
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      color: var(--muted);
      background: var(--panel);
      text-align: center;
    }

    dialog {
      width: min(980px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      background: var(--panel);
      color: var(--text);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.78);
    }

    .preview-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .preview-name {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    button {
      flex: 0 0 auto;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #262d34;
      color: var(--text);
      font: inherit;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    .preview-img {
      display: block;
      width: 100%;
      max-height: 78vh;
      object-fit: contain;
      background: #090a0c;
    }

    @media (max-width: 720px) {
      .bar {
        grid-template-columns: 1fr;
      }

      .tools {
        justify-content: stretch;
      }

      input,
      select {
        width: 100%;
        flex: 1 1 100%;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
        gap: 10px;
      }
    }
  </style>
</head>

      </div>
      <div class="tools">

        <select id="sort">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="name">Name</option>

    </div>
  </header>

  <main>

      <button id="close-preview" type="button">Close</button>
    </div>
    <img id="preview-img" class="preview-img" alt="">
  </dialog>

    const gallery = document.querySelector("#gallery");
    const empty = document.querySelector("#empty");
    const visibleCount = document.querySelector("#visible-count");
    const search = document.querySelector("#search");
    const sort = document.querySelector("#sort");
    const preview = document.querySelector("#preview");
    const previewImg = document.querySelector("#preview-img");
    const previewName = document.querySelector("#preview-name");
    const closePreview = document.querySelector("#close-preview");

    function getTimestamp(path) {
      const match = path.match(/_(\d+)\.png$/);
      return match ? Number(match[1]) : 0;
    }

    function formatName(path) {
      return path.split("/").pop();
    }

    function sortedImages(images) {
      return [...images].sort((a, b) => {
        if (sort.value === "oldest") return getTimestamp(a) - getTimestamp(b);
        if (sort.value === "name") return formatName(a).localeCompare(formatName(b));
        return getTimestamp(b) - getTimestamp(a);
      });
    }

    function openPreview(path) {
      previewImg.src = path;
      previewImg.alt = formatName(path);
      previewName.textContent = formatName(path);
      preview.showModal();
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const filtered = sortedImages(imagePaths).filter((path) => {
        return formatName(path).toLowerCase().includes(query);
      });

      gallery.replaceChildren();
      visibleCount.textContent = filtered.length;
      empty.style.display = filtered.length ? "none" : "block";

      const fragment = document.createDocumentFragment();
      filtered.forEach((path) => {
        const figure = document.createElement("figure");
        const img = document.createElement("img");
        const caption = document.createElement("figcaption");

        img.src = path;
        img.alt = formatName(path);
        img.loading = "lazy";
        caption.textContent = formatName(path);
        figure.append(img, caption);
        figure.addEventListener("click", () => openPreview(path));
        fragment.append(figure);
      });

      gallery.append(fragment);
    }

    search.addEventListener("input", render);
    sort.addEventListener("change", render);
    closePreview.addEventListener("click", () => preview.close());
    preview.addEventListener("click", (event) => {
      if (event.target === preview) preview.close();
    });

    render();
